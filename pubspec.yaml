name: attachment_studio
description: "A comprehensive attachment picker and document scanner for Flutter. Supports camera, gallery, file picking, and native document scanning with cropping."
version: 1.0.0
homepage: https://github.com/example/attachment_studio

environment:
  sdk: ^3.11.0
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  image_cropper: ^5.0.0
  path: ^1.8.3
  path_provider: ^2.1.0
  pdf: ^3.10.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.attachment_studio
        pluginClass: AttachmentStudioPlugin
      ios:
        pluginClass: AttachmentStudioPlugin
